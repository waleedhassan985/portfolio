<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" style="background:#fff">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .axis-label { font-size: 14px; fill: #334155; }
      .tick-label { font-size: 12px; fill: #64748b; }
      .bar-label { font-size: 13px; font-weight: 600; fill: #1e293b; }
    </style>
  </defs>
  
  <!-- Chart Title -->
  <text x="350" y="30" text-anchor="middle" style="font-size: 16px; font-weight: 600; fill: #1e293b;">Survival Status Distribution</text>
  
  <!-- Chart Area -->
  <g transform="translate(100, 80)">
    <!-- Y-axis -->
    <line x1="0" y1="0" x2="0" y2="480" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Y-axis labels -->
    <text x="-10" y="485" text-anchor="end" class="tick-label">0</text>
    <text x="-10" y="389" text-anchor="end" class="tick-label">100</text>
    <text x="-10" y="293" text-anchor="end" class="tick-label">200</text>
    <text x="-10" y="197" text-anchor="end" class="tick-label">300</text>
    <text x="-10" y="101" text-anchor="end" class="tick-label">400</text>
    <text x="-10" y="5" text-anchor="end" class="tick-label">500</text>
    
    <!-- Y-axis title -->
    <text x="-60" y="240" text-anchor="middle" transform="rotate(-90, -60, 240)" class="axis-label" style="font-weight: 600;">Number of Passengers</text>
    
    <!-- Grid lines -->
    <line x1="0" y1="96" x2="500" y2="96" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="0" y1="192" x2="500" y2="192" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="0" y1="288" x2="500" y2="288" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="0" y1="384" x2="500" y2="384" stroke="#f1f5f9" stroke-width="1"/>
    
    <!-- X-axis -->
    <line x1="0" y1="480" x2="500" y2="480" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Bars -->
    <!-- Survived bar (342 passengers, ~342px height) -->
    <rect x="80" y="152" width="150" height="328" fill="#2e7aaf" rx="4"/>
    <text x="155" y="135" text-anchor="middle" class="bar-label">342</text>
    
    <!-- Dead bar (549 passengers, ~549px height, scaled to 480px max) -->
    <rect x="320" y="32" width="150" height="448" fill="#2e7aaf" rx="4"/>
    <text x="395" y="15" text-anchor="middle" class="bar-label">549</text>
    
    <!-- X-axis labels -->
    <text x="155" y="510" text-anchor="middle" class="axis-label" style="font-weight: 600;">Survived</text>
    <text x="395" y="510" text-anchor="middle" class="axis-label" style="font-weight: 600;">Dead</text>
    
    <!-- X-axis title -->
    <text x="250" y="545" text-anchor="middle" class="axis-label" style="font-weight: 600;">Status</text>
  </g>
</svg>
