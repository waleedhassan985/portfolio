<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chart-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  
  <!-- Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#cbd5e1" stroke-width="1"/>
  </g>
  
  <!-- Left Side - Dashboard Mockup -->
  <g transform="translate(50, 80)">
    <!-- Mini Dashboard Card -->
    <rect width="500" height="470" rx="16" fill="#334155" opacity="0.9"/>
    
    <!-- Header -->
    <text x="250" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#f1f5f9" text-anchor="middle">Social Media Dashboard</text>
    
    <!-- KPI Cards Row -->
    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="110" height="70" rx="8" fill="#1e293b"/>
      <text x="55" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#accent-grad)" text-anchor="middle">568K</text>
      <text x="55" y="55" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Followers</text>
      
      <rect x="125" y="0" width="110" height="70" rx="8" fill="#1e293b"/>
      <text x="180" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#accent-grad)" text-anchor="middle">5.56%</text>
      <text x="180" y="55" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Engagement</text>
      
      <rect x="250" y="0" width="110" height="70" rx="8" fill="#1e293b"/>
      <text x="305" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#accent-grad)" text-anchor="middle">29K</text>
      <text x="305" y="55" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">New</text>
      
      <rect x="375" y="0" width="105" height="70" rx="8" fill="#1e293b"/>
      <text x="427" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#accent-grad)" text-anchor="middle">100</text>
      <text x="427" y="55" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Posts</text>
    </g>
    
    <!-- Chart Section -->
    <g transform="translate(20, 170)">
      <!-- Bar Chart -->
      <rect x="0" y="0" width="220" height="140" rx="8" fill="#1e293b"/>
      <text x="110" y="20" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Platform Likes</text>
      
      <!-- Bars -->
      <rect x="20" y="70" width="35" height="50" rx="4" fill="url(#chart-grad)"/>
      <rect x="65" y="55" width="35" height="65" rx="4" fill="url(#chart-grad)"/>
      <rect x="110" y="80" width="35" height="40" rx="4" fill="url(#chart-grad)"/>
      <rect x="155" y="90" width="35" height="30" rx="4" fill="url(#chart-grad)"/>
      
      <!-- Line Chart -->
      <rect x="240" y="0" width="240" height="140" rx="8" fill="#1e293b"/>
      <text x="360" y="20" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Growth Trend</text>
      
      <path d="M 260,100 L 285,85 L 310,90 L 335,70 L 360,75 L 385,60 L 410,80 L 435,70 L 460,65" 
            stroke="#a78bfa" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 260,100 L 285,85 L 310,90 L 335,70 L 360,75 L 385,60 L 410,80 L 435,70 L 460,65 L 460,120 L 260,120 Z" 
            fill="url(#chart-grad)" opacity="0.3"/>
    </g>
    
    <!-- Bottom Row Charts -->
    <g transform="translate(20, 330)">
      <!-- Engagement Chart -->
      <rect x="0" y="0" width="150" height="110" rx="8" fill="#1e293b"/>
      <text x="75" y="20" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">Engagement</text>
      <path d="M 20,60 L 40,70 L 60,55 L 80,65 L 100,50 L 120,60 L 130,55" 
            stroke="#a78bfa" stroke-width="2" fill="none"/>
      
      <!-- Impressions Chart -->
      <rect x="165" y="0" width="150" height="110" rx="8" fill="#1e293b"/>
      <text x="240" y="20" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">Impressions</text>
      <path d="M 185,50 L 205,70 L 225,45 L 245,60 L 265,40 L 285,55 L 295,50" 
            stroke="#a78bfa" stroke-width="2" fill="none"/>
      
      <!-- Demographics Chart -->
      <rect x="330" y="0" width="150" height="110" rx="8" fill="#1e293b"/>
      <text x="405" y="20" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">Demographics</text>
      <circle cx="380" cy="70" r="25" fill="none" stroke="url(#accent-grad)" stroke-width="8" stroke-dasharray="80 20"/>
      <circle cx="380" cy="70" r="25" fill="none" stroke="#475569" stroke-width="8" stroke-dasharray="0 100"/>
    </g>
  </g>
  
  <!-- Right Side - Title and Info -->
  <g transform="translate(600, 150)">
    <!-- Title Box -->
    <rect x="0" y="0" width="550" height="200" rx="16" fill="#8b5cf6" opacity="0.15"/>
    <text x="30" y="60" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#f1f5f9">
      Social Media
    </text>
    <text x="30" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="url(#accent-grad)">
      Analytics Dashboard
    </text>
    
    <!-- Description -->
    <text x="30" y="170" font-family="Arial, sans-serif" font-size="18" fill="#cbd5e1">
      Interactive Power BI dashboard tracking
    </text>
    <text x="30" y="195" font-family="Arial, sans-serif" font-size="18" fill="#cbd5e1">
      engagement across multiple platforms
    </text>
    
    <!-- Platform Icons -->
    <g transform="translate(30, 240)">
      <!-- Facebook -->
      <circle cx="30" cy="30" r="28" fill="#1877f2" opacity="0.8"/>
      <text x="30" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">f</text>
      
      <!-- Instagram -->
      <circle cx="100" cy="30" r="28" fill="#e4405f" opacity="0.8"/>
      <rect x="85" y="15" width="30" height="30" rx="8" fill="none" stroke="#fff" stroke-width="3"/>
      <circle cx="100" cy="30" r="8" fill="none" stroke="#fff" stroke-width="3"/>
      
      <!-- LinkedIn -->
      <circle cx="170" cy="30" r="28" fill="#0077b5" opacity="0.8"/>
      <text x="170" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">in</text>
      
      <!-- Twitter/X -->
      <circle cx="240" cy="30" r="28" fill="#1da1f2" opacity="0.8"/>
      <text x="240" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">𝕏</text>
    </g>
    
    <!-- Tech Badges -->
    <g transform="translate(30, 330)">
      <rect x="0" y="0" width="100" height="30" rx="15" fill="#8b5cf6" opacity="0.3"/>
      <text x="50" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">Power BI</text>
      
      <rect x="110" y="0" width="60" height="30" rx="15" fill="#8b5cf6" opacity="0.3"/>
      <text x="140" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">DAX</text>
      
      <rect x="180" y="0" width="120" height="30" rx="15" fill="#8b5cf6" opacity="0.3"/>
      <text x="240" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">Power Query</text>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="1100" cy="550" r="60" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="150" cy="550" r="40" fill="#a78bfa" opacity="0.1"/>
  <circle cx="1050" cy="100" r="50" fill="#c084fc" opacity="0.1"/>
</svg>