<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="bold">
    Healthcare Data Warehousing &amp; BI Architecture
  </text>
  
  <!-- Layer 5: Presentation -->
  <rect x="150" y="60" width="500" height="60" rx="8" fill="url(#grad5)"/>
  <text x="400" y="85" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold">
    Presentation Layer
  </text>
  <text x="400" y="105" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle">
    Power BI Dashboards | Flask Web App
  </text>
  
  <!-- Arrow -->
  <path d="M 400 120 L 400 135" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Layer 4: OLAP -->
  <rect x="150" y="145" width="500" height="60" rx="8" fill="url(#grad4)"/>
  <text x="400" y="170" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold">
    OLAP Cubes - SSAS
  </text>
  <text x="400" y="190" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle">
    4 Cubes | Measures | Hierarchies | Partitions
  </text>
  
  <!-- Arrow -->
  <path d="M 400 205 L 400 220" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Layer 3: Data Warehouse -->
  <rect x="150" y="230" width="500" height="60" rx="8" fill="url(#grad3)"/>
  <text x="400" y="255" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">
    Data Warehouse - Star Schema
  </text>
  <text x="400" y="275" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">
    6 Dimensions | 5 Fact Tables
  </text>
  
  <!-- Arrow -->
  <path d="M 400 290 L 400 305" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Layer 2: ETL -->
  <rect x="150" y="315" width="500" height="60" rx="8" fill="url(#grad2)"/>
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">
    ETL Pipeline - Pentaho
  </text>
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">
    Extract | Transform | Load | Orchestration
  </text>
  
  <!-- Arrow -->
  <path d="M 400 375 L 400 390" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Layer 1: OLTP -->
  <rect x="150" y="400" width="500" height="60" rx="8" fill="url(#grad1)"/>
  <text x="400" y="425" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">
    OLTP Source Database
  </text>
  <text x="400" y="445" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">
    8 Tables | Healthcare Operations Data
  </text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8" />
    </marker>
  </defs>
</svg>