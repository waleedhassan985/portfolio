<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neuralGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Neural Network Visualization -->
  <!-- Input Layer (13 neurons) -->
  <g id="inputLayer" opacity="0.6">
    <circle cx="150" cy="100" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="140" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="180" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="220" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="260" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="300" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="340" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="380" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="420" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="460" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="500" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="540" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="150" cy="580" r="8" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
  </g>
  
  <!-- Connection Lines from Input to Hidden Layer 1 (sample connections) -->
  <g opacity="0.2">
    <line x1="158" y1="140" x2="342" y2="180" stroke="#ffffff" stroke-width="1"/>
    <line x1="158" y1="180" x2="342" y2="220" stroke="#ffffff" stroke-width="1"/>
    <line x1="158" y1="220" x2="342" y2="260" stroke="#ffffff" stroke-width="1"/>
    <line x1="158" y1="260" x2="342" y2="300" stroke="#ffffff" stroke-width="1"/>
    <line x1="158" y1="300" x2="342" y2="340" stroke="#ffffff" stroke-width="1"/>
    <line x1="158" y1="340" x2="342" y2="380" stroke="#ffffff" stroke-width="1"/>
    <line x1="158" y1="380" x2="342" y2="420" stroke="#ffffff" stroke-width="1"/>
    <line x1="158" y1="420" x2="342" y2="460" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Hidden Layer 1 (128 neurons - represented by 8) -->
  <g id="hidden1" opacity="0.5">
    <circle cx="350" cy="180" r="10" fill="#00f2fe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="350" cy="220" r="10" fill="#00f2fe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="350" cy="260" r="10" fill="#00f2fe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="350" cy="300" r="10" fill="#00f2fe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="350" cy="340" r="10" fill="#00f2fe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="350" cy="380" r="10" fill="#00f2fe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="350" cy="420" r="10" fill="#00f2fe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="350" cy="460" r="10" fill="#00f2fe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
  </g>
  
  <!-- Connection Lines to Hidden Layer 2 -->
  <g opacity="0.2">
    <line x1="360" y1="220" x2="532" y2="250" stroke="#ffffff" stroke-width="1"/>
    <line x1="360" y1="260" x2="532" y2="290" stroke="#ffffff" stroke-width="1"/>
    <line x1="360" y1="300" x2="532" y2="330" stroke="#ffffff" stroke-width="1"/>
    <line x1="360" y1="340" x2="532" y2="370" stroke="#ffffff" stroke-width="1"/>
    <line x1="360" y1="380" x2="532" y2="410" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Hidden Layer 2 (64 neurons - represented by 6) -->
  <g id="hidden2" opacity="0.4">
    <circle cx="540" cy="250" r="10" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="540" cy="290" r="10" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="540" cy="330" r="10" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="540" cy="370" r="10" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="540" cy="410" r="10" fill="#4facfe" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
  </g>
  
  <!-- Brain Icon Overlay -->
  <g transform="translate(700, 200)">
    <circle cx="100" cy="100" r="90" fill="#ffffff" opacity="0.15"/>
    <circle cx="100" cy="100" r="80" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    
    <!-- Brain paths -->
    <path d="M 60 80 Q 70 60, 90 65 T 120 70 Q 130 75, 135 85" 
          fill="none" stroke="#ffffff" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
    <path d="M 60 100 Q 70 90, 85 92 T 110 95 Q 125 97, 135 105" 
          fill="none" stroke="#ffffff" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
    <path d="M 60 120 Q 75 110, 90 112 T 115 118 Q 125 122, 135 125" 
          fill="none" stroke="#ffffff" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
    
    <path d="M 70 70 Q 75 80, 80 85" 
          fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
    <path d="M 90 75 Q 92 85, 95 90" 
          fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
    <path d="M 110 80 Q 112 90, 115 95" 
          fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  </g>
  
  <!-- Main Content -->
  <rect x="50" y="40" width="1100" height="200" fill="#000000" opacity="0.3" rx="15"/>
  
  <!-- Title -->
  <text x="600" y="110" style="font-family: 'Segoe UI', system-ui, sans-serif; font-size: 56px; fill: #FFFFFF; font-weight: 800; text-anchor: middle;">
    Student Depression Prediction
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="160" style="font-family: 'Segoe UI', system-ui, sans-serif; font-size: 24px; fill: #E0E7FF; text-anchor: middle;">
    AI-Powered Mental Health Risk Assessment using Artificial Neural Networks
  </text>
  
  <!-- Tech Stack Badges -->
  <g transform="translate(300, 190)">
    <!-- Python Badge -->
    <rect x="0" y="0" width="100" height="32" fill="#3776AB" rx="16"/>
    <text x="50" y="21" style="font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #FFFFFF; font-weight: 600; text-anchor: middle;">Python</text>
    
    <!-- TensorFlow Badge -->
    <rect x="115" y="0" width="130" height="32" fill="#FF6F00" rx="16"/>
    <text x="180" y="21" style="font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #FFFFFF; font-weight: 600; text-anchor: middle;">TensorFlow</text>
    
    <!-- Keras Badge -->
    <rect x="260" y="0" width="90" height="32" fill="#D00000" rx="16"/>
    <text x="305" y="21" style="font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #FFFFFF; font-weight: 600; text-anchor: middle;">Keras</text>
    
    <!-- ANN Badge -->
    <rect x="365" y="0" width="75" height="32" fill="#8B5CF6" rx="16"/>
    <text x="402" y="21" style="font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #FFFFFF; font-weight: 600; text-anchor: middle;">ANN</text>
    
    <!-- Streamlit Badge -->
    <rect x="455" y="0" width="110" height="32" fill="#FF4B4B" rx="16"/>
    <text x="510" y="21" style="font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #FFFFFF; font-weight: 600; text-anchor: middle;">Streamlit</text>
  </g>
  
  <!-- Stats Cards -->
  <g transform="translate(100, 450)">
    <!-- Accuracy Card -->
    <rect x="0" y="0" width="220" height="120" fill="#FFFFFF" opacity="0.95" rx="12"/>
    <text x="110" y="45" style="font-family: 'Segoe UI', sans-serif; font-size: 42px; fill: #667eea; font-weight: 700; text-anchor: middle;">13</text>
    <text x="110" y="75" style="font-family: 'Segoe UI', sans-serif; font-size: 16px; fill: #6B7280; text-anchor: middle;">Input Features</text>
    <text x="110" y="100" style="font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #9CA3AF; text-anchor: middle;">Multi-factor Analysis</text>
    
    <!-- Features Card -->
    <rect x="250" y="0" width="220" height="120" fill="#FFFFFF" opacity="0.95" rx="12"/>
    <text x="360" y="45" style="font-family: 'Segoe UI', sans-serif; font-size: 36px; fill: #667eea; font-weight: 700; text-anchor: middle;">128→64→32</text>
    <text x="360" y="75" style="font-family: 'Segoe UI', sans-serif; font-size: 16px; fill: #6B7280; text-anchor: middle;">ANN Architecture</text>
    <text x="360" y="100" style="font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #9CA3AF; text-anchor: middle;">Deep Learning Model</text>
    
    <!-- Model Card -->
    <rect x="500" y="0" width="220" height="120" fill="#FFFFFF" opacity="0.95" rx="12"/>
    <text x="610" y="45" style="font-family: 'Segoe UI', sans-serif; font-size: 42px; fill: #667eea; font-weight: 700; text-anchor: middle;">Real-time</text>
    <text x="610" y="75" style="font-family: 'Segoe UI', sans-serif; font-size: 16px; fill: #6B7280; text-anchor: middle;">Predictions</text>
    <text x="610" y="100" style="font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #9CA3AF; text-anchor: middle;">Instant Risk Assessment</text>
    
    <!-- Deployment Card -->
    <rect x="750" y="0" width="220" height="120" fill="#FFFFFF" opacity="0.95" rx="12"/>
    <text x="860" y="45" style="font-family: 'Segoe UI', sans-serif; font-size: 42px; fill: #667eea; font-weight: 700; text-anchor: middle;">57.99%</text>
    <text x="860" y="75" style="font-family: 'Segoe UI', sans-serif; font-size: 16px; fill: #6B7280; text-anchor: middle;">Sample Prediction</text>
    <text x="860" y="100" style="font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #9CA3AF; text-anchor: middle;">Depression Probability</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="1050" cy="100" r="60" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="100" cy="550" r="40" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="1100" cy="500" r="50" fill="#FFFFFF" opacity="0.07"/>
</svg>
